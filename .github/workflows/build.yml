name: Build

on:
  push:
    branches: [main, memory-based-chat]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed for creating releases on tag pushes

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Verify g++ + windres
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\mingw64\bin;" + $env:Path
          g++ --version
          windres --version

      - name: Build (PowerShell script — primary)
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\mingw64\bin;" + $env:Path
          .\build_release.ps1

      - name: Run tests
        shell: pwsh
        run: |
          if (Test-Path tests.exe) { .\tests.exe } else { Write-Warning "tests.exe missing - skipping" }

      - name: Verify CMake build path also works (cross-platform readiness check)
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\mingw64\bin;" + $env:Path
          cmake --version
          cmake -S . -B build-cmake -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build-cmake --parallel
          if (-not (Test-Path build-cmake\overlay.exe)) {
            throw "CMake build did not produce overlay.exe"
          }
          if (-not (Test-Path build-cmake\tests.exe)) {
            throw "CMake build did not produce tests.exe"
          }
          .\build-cmake\tests.exe
          Write-Host "CMake build OK: overlay.exe + tests.exe both produced and tests passed"

      - name: Upload artifact (every build)
        uses: actions/upload-artifact@v4
        with:
          name: overlay-windows-${{ github.sha }}
          path: project_app/
          retention-days: 14

      # ---- Release path: only runs when pushing a v* tag ----

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $name = "Interview-Hack-${{ github.ref_name }}-windows.zip"
          Compress-Archive -Path project_app\* -DestinationPath $name -Force
          Get-Item $name | Select-Object Name, Length

      - name: Create / update GitHub Release (Windows zip)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Interview-Hack-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false

  macos:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Verify toolchain
        run: |
          cmake --version
          clang++ --version

      - name: CMake configure + build
        run: |
          cmake -B build-cmake -DCMAKE_BUILD_TYPE=Release
          cmake --build build-cmake --parallel
          test -f build-cmake/overlay.app/Contents/MacOS/overlay
          test -f build-cmake/tests
          ./build-cmake/tests

      - name: Ad-hoc codesign the .app
        # The free fallback to Apple Developer ID signing. Removes the
        # "damaged and can't be opened" Gatekeeper error on first launch by
        # making the bundle at least *something*-signed. Users still see the
        # gentler "developer cannot be verified" prompt and can right-click →
        # Open the first time. Cost: zero. Benefit: ~99% of users don't need
        # to run `xattr -dr com.apple.quarantine` to launch the app.
        run: |
          codesign --force --deep --sign - build-cmake/overlay.app
          codesign --verify --deep --strict --verbose=2 build-cmake/overlay.app
          codesign --display --verbose=2 build-cmake/overlay.app 2>&1 | head -10

      - name: Stage .app bundle for artifact
        run: |
          mkdir -p mac_app
          cp -R build-cmake/overlay.app mac_app/
          cp models_list.txt mac_app/ || true
          cp README.md mac_app/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: overlay-macos-${{ github.sha }}
          path: mac_app/
          retention-days: 14

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd mac_app
          zip -ry "../Interview-Hack-${{ github.ref_name }}-macos.zip" .
          cd ..
          ls -la Interview-Hack-${{ github.ref_name }}-macos.zip

      - name: Attach macOS zip to the same Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Interview-Hack-${{ github.ref_name }}-macos.zip
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
